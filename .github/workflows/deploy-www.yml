name: Deploy WWW
on:
  push:
    branches: [master]
permissions:
  id-token: write
  pages: write
  contents: read
concurrency:
  group: deploy-www
  cancel-in-progress: false
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - run: bun ci
      - run: bun www:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/www
      - id: deployment
        uses: actions/deploy-pages@v4
